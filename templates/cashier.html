<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLO PIZZA PRO - Système de Caisse</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .header { background: #d32f2f; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn { padding: 12px 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; color: white; transition: 0.2s; min-width: 100px; }
        .btn-place { background: #f39c12; } /* Orange pour Sur Place */
        .btn-emporte { background: #27ae60; } /* Vert pour Emporté */
        .btn-livraison { background: #2980b9; } /* Bleu pour Livraison */
        .btn:active { transform: scale(0.9); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-top: 10px solid #ccc; text-align: left; }
        .card.place { border-top-color: #f39c12; }
        .card.emporte { border-top-color: #27ae60; }
        .card.livraison { border-top-color: #2980b9; }
        .section-title { font-size: 12px; font-weight: bold; color: #7f8c8d; margin-top: 10px; text-transform: uppercase; }
        input, textarea, select { width: 100%; margin: 5px 0 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .badge { display: inline-block; padding: 5px 12px; border-radius: 15px; font-size: 11px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .btn-send { background: #d32f2f; color: white; width: 100%; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0;">🍕 ALLO PIZZA PRO</h1>
    <p style="margin:5px 0 0 0; opacity: 0.9;">Prise de commande rapide</p>
</div>

<div class="btn-group">
    <button class="btn btn-place" onclick="addCard('place')">🍽️ SUR PLACE</button>
    <button class="btn btn-emporte" onclick="addCard('emporte')">🛍️ EMPORTÉ</button>
    <button class="btn btn-livraison" onclick="addCard('livraison')">🚚 LIVRAISON</button>
</div>

<div id="grid" class="grid"></div>

<script>
    const socket = io();

    function addCard(type) {
        const grid = document.getElementById('grid');
        const id = Date.now();
        const card = document.createElement('div');
        const typeLabels = {'place': '🍽️ SUR PLACE', 'emporte': '🛍️ EMPORTÉ', 'livraison': '🚚 LIVRAISON'};
        
        card.className = `card ${type}`;
        card.id = `card-${id}`;
        
        let html = `
            <span class="badge" style="background:#eee; color:#333;">${typeLabels[type]}</span>
            
            <div class="section-title">Client / Table</div>
            <input type="text" id="nom-${id}" placeholder="${type === 'place' ? 'N° de table...' : 'Nom du client...'}">
            
            <div class="section-title">🍕 Pizzas</div>
            <textarea id="pizza-${id}" rows="2" placeholder="Ex: 1 Margharita, 2 Regina..."></textarea>
            
            <div class="section-title">🥤 Boissons & Desserts</div>
            <input type="text" id="extra-${id}" placeholder="Ex: 2 Coca, 1 Tiramisu...">
        `;

        if(type === 'livraison') {
            html += `
                <div class="section-title">🏠 Adresse</div>
                <input type="text" id="adresse-${id}" placeholder="Adresse complète...">
            `;
        }

        html += `<button class="btn-send" onclick="sendOrder('${id}', '${type}')">ENVOYER EN CUISINE 🚀</button>`;
        
        card.innerHTML = html;
        grid.prepend(card);
    }

    function sendOrder(id, type) {
        const data = {
            id: id,
            type: type,
            nom: document.getElementById(`nom-${id}`).value,
            pizza: document.getElementById(`pizza-${id}`).value,
            extra: document.getElementById(`extra-${id}`).value,
            adresse: type === 'livraison' ? document.getElementById(`adresse-${id}`).value : 'Sur place/Emporté'
        };
        
        socket.emit('new_order', data);
        
        const card = document.getElementById(`card-${id}`);
        card.style.transition = '0.5s';
        card.style.opacity = '0.3';
        card.innerHTML = `<div style="text-align:center; padding:40px;"><h2>✅ Envoyé !</h2><p>Commande ${data.nom} transmise.</p></div>`;
        
        setTimeout(() => { card.remove(); }, 1500);
    }
</script>

</body>
</html>
