<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍕 CAISSE PRO - PIZZA IA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: white; padding: 15px; margin:0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn { background: #1e293b; border: 2px solid #334155; color: white; padding: 18px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn.active { border-color: #3b82f6; background: #1e3a8a; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .btn-add { background: #3b82f6; color: white; width: 100%; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .panier { background: #1e293b; padding: 15px; border-radius: 12px; border: 2px solid #3b82f6; margin-top: 20px; min-height: 80px; }
        .panier-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; font-size: 14px; }
        .type-grid { display: flex; gap: 8px; margin-top: 20px; }
        .type-btn { flex: 1; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; opacity: 0.4; cursor: pointer; }
        .type-btn.active { opacity: 1; border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-send { background: #22c55e; color: white; width: 100%; border: none; padding: 22px; border-radius: 15px; font-weight: bold; font-size: 22px; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body>
    <h2 style="text-align:center; color:#ef4444; text-transform:uppercase; letter-spacing:2px;">🍕 Pizza IA POS</h2>

    <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
        <button id="s-Junior" class="btn" onclick="setS('Junior', 0)">JUNIOR</button>
        <button id="s-Senior" class="btn active" onclick="setS('Senior', 3)">SENIOR</button>
        <button id="s-Mega" class="btn" onclick="setS('Mega', 7)">MEGA</button>
    </div>

    <div class="grid">
        <button class="btn pz" id="p-Marguerita" onclick="setP('Marguerita', 8)">🧀 Marguerita</button>
        <button class="btn pz" id="p-Reine" onclick="setP('Reine', 10)">🍄 Reine</button>
        <button class="btn pz" id="p-4Fromages" onclick="setP('4 Fromages', 12)">🧀 4 Fromages</button>
        <button class="btn pz" id="p-Calzone" onclick="setP('Calzone', 11)">🥟 Calzone</button>
    </div>
    <button class="btn-add" onclick="addPanier()">➕ AJOUTER AU PANIER</button>

    <div class="panier">
        <strong style="color:#fbbf24;">🛒 COMMANDE EN COURS :</strong>
        <div id="list-p"></div>
        <div style="display:flex; justify-content:space-between; margin-top:10px; font-weight:bold; border-top:1px solid #3b82f6; padding-top:10px;">
            <span>TOTAL :</span> <span id="tot-p" style="color:#22c55e">0.00</span>€
        </div>
    </div>

    <div class="type-grid">
        <button id="m-place" class="type-btn active" style="background:#f39c12" onclick="setM('SUR PLACE','Table 5','N/A')">🏠 TABLE</button>
        <button id="m-emporte" class="type-btn" style="background:#22c55e" onclick="setM('EMPORTE','M. Martin','N/A')">🛍️ EMPORTÉ</button>
        <button id="m-livre" class="type-btn" style="background:#3b82f6" onclick="setM('LIVRAISON','M. Durand','12 Rue de la Paix, Paris')">🚀 LIVRER</button>
    </div>

    <button class="btn-send" onclick="valider()">VALIDER ET ENVOYER 🚀</button>

<script>
    const socket = io();
    let sz='Senior', addP=3, piz='', baseP=0, mode='SUR PLACE', nom='Table 5', adr='N/A';
    let panier = []; let total = 0;

    function setS(s,p){ sz=s; addP=p; upd(); }
    function setP(n,p){ piz=n; baseP=p; upd(); }
    function setM(m,n,a){ mode=m; nom=n; adr=a; upd(); }

    function upd(){
        document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
        document.getElementById('s-'+sz).classList.add('active');
        document.querySelectorAll('.pz').forEach(b=>b.style.borderColor="#334155");
        if(piz) document.getElementById('p-'+piz.replace(' ','')).style.borderColor="#3b82f6";
        document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
        document.getElementById(mode==='SUR PLACE'?'m-place':mode==='EMPORTE'?'m-emporte':'m-livre').classList.add('active');
    }

    function addPanier(){
        if(!piz) return alert("Veuillez choisir une pizza !");
        let p = parseFloat(baseP)+parseFloat(addP);
        panier.push({n:piz, s:sz, p:p}); total += p;
        const div = document.getElementById('list-p');
        div.innerHTML = panier.map(i=>`<div class="panier-item"><span>1x ${i.n} (${i.s})</span><span>${i.p.toFixed(2)}€</span></div>`).join('');
        document.getElementById('tot-p').innerText = total.toFixed(2);
    }

    function valider(){
        if(panier.length===0) return alert("Le panier est vide !");
        socket.emit('new_order', {
            id:Date.now(), type:mode, nom:nom, tel:"0612345678",
            pizza: panier.map(i=>`1x ${i.n} (${i.s})`).join(' + '),
            total: total.toFixed(2), adresse: adr
        });
        alert("Commande envoyée en cuisine !"); location.reload();
    }
</script>
</body>
</html>
