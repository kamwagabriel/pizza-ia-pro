<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍕 CAISSE ALLO PIZZA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111827; color: white; margin: 0; padding: 10px; }
        .header { background: #d32f2f; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .card { background: #1f2937; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #374151; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #374151; background: #111827; color: white; font-size: 16px; box-sizing: border-box; }
        .btn-send { background: #d32f2f; color: white; width: 100%; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 18px; margin-top: 5px; }
        .success-msg { text-align: center; color: #22c55e; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>
    <div class="header"><h2>🍕 CAISSE RAPIDE</h2></div>
    <div class="tabs">
        <button class="tab" style="background:#f39c12" onclick="add('place')">SUR PLACE</button>
        <button class="tab" style="background:#22c55e" onclick="add('emporte')">EMPORTÉ</button>
        <button class="tab" style="background:#3b82f6" onclick="add('livraison')">LIVRER</button>
    </div>
    <div id="main"></div>

<script>
    const socket = io();
    function add(type) {
        const id = Date.now();
        const html = `
            <div class="card" id="c-${id}">
                <h3 style="margin:0; color:${type==='place'?'#f39c12':type==='emporte'?'#22c55e':'#3b82f6'}">${type.toUpperCase()}</h3>
                <input type="text" id="n-${id}" placeholder="Nom ou Table">
                <textarea id="p-${id}" placeholder="Pizzas..." rows="2"></textarea>
                <input type="text" id="e-${id}" placeholder="Boissons/Desserts">
                <input type="number" id="t-${id}" placeholder="Prix Total (€)">
                ${type==='livraison' ? `<input type="text" id="a-${id}" placeholder="Adresse complète">` : ''}
                <button class="btn-send" onclick="send('${id}','${type}')">ENVOYER EN CUISINE 🚀</button>
            </div>`;
        document.getElementById('main').insertAdjacentHTML('afterbegin', html);
    }
    function send(id, type) {
        const data = {
            id: id, type: type,
            nom: document.getElementById(`n-${id}`).value,
            pizza: document.getElementById(`p-${id}`).value,
            extra: document.getElementById(`e-${id}`).value,
            total: document.getElementById(`t-${id}`).value || "0",
            adresse: type==='livraison' ? document.getElementById(`a-${id}`).value : 'N/A'
        };
        socket.emit('new_order', data);
        document.getElementById(`c-${id}`).innerHTML = "<div class='success-msg'>✅ COMMANDE ENVOYÉE !</div>";
        setTimeout(() => document.getElementById(`c-${id}`).remove(), 1000);
    }
</script>
</body>
</html>
