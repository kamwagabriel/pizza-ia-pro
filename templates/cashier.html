<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🍕 ALLO PIZZA PRO</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --success: #22c55e; --danger: #ef4444; --warning: #fbbf24; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--card); padding-bottom: 10px; flex-shrink: 0; }
        
        .main-layout { display: grid; grid-template-columns: 280px 1fr 300px; gap: 20px; flex-grow: 1; overflow: hidden; margin-top: 20px; }
        
        /* Panneau Saisie Manuelle */
        .panel { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        .orders-grid { display: flex; gap: 15px; flex-wrap: wrap; align-content: flex-start; overflow-y: auto; padding-right: 10px; }
        
        .card { background: var(--card); border-radius: 12px; width: 300px; padding: 15px; border: 2px solid transparent; position: relative; height: fit-content; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .blink { border: 2px solid var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { border-color: transparent; } }
        
        .p-item { background: #334155; padding: 8px; margin: 5px 0; border-radius: 6px; border-left: 4px solid var(--warning); font-size: 14px; }
        .total-price { font-size: 28px; font-weight: 800; color: var(--success); text-align: right; }
        
        .btn-group { display: flex; gap: 5px; margin-top: 15px; }
        .btn { border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; color: white; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }

        /* Boutons de Démo en bas */
        .demo-controls { position: fixed; bottom: 20px; right: 340px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 50px; display: flex; gap: 15px; border: 1px solid var(--accent); backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <header>
        <h1>🍕 ALLO PIZZA <span style="color:var(--accent)">PRO</span></h1>
        <div id="status" style="font-size:14px; color:var(--warning);">Initialisation...</div>
        <div id="clock" style="font-size:22px; color:var(--accent);">00:00:00</div>
    </header>

    <div class="main-layout">
        <div class="panel">
            <h3 style="color:var(--success); margin-top:0;">🛒 COMPTOIR</h3>
            <label style="font-size: 12px;">Pizza :</label>
            <input type="text" id="manual-pizza" placeholder="Ex: Royale">
            <label style="font-size: 12px;">Taille :</label>
            <select id="manual-size">
                <option value="Senior">Senior</option>
                <option value="Mega">Mega</option>
                <option value="Junior">Junior</option>
            </select>
            <button class="btn" style="background:var(--success); margin-top:10px;" onclick="addManualOrder()">+ AJOUTER</button>
            <p style="font-size:11px; color:#64748b; margin-top:20px;">Utilisez ceci pour les clients en face de vous.</p>
        </div>

        <div class="orders-grid" id="orders-container"></div>

        <div class="sidebar">
            <div class="panel" style="margin-bottom:20px;"><canvas id="salesChart"></canvas></div>
            <div class="panel" style="height: 250px; overflow-y: auto;">
                <h3 style="margin:0; font-size:14px; color:var(--warning); position: sticky; top: 0; background: var(--card);">DERNIÈRES VENTES</h3>
                <div id="history-list"></div>
            </div>
        </div>
    </div>

    <div class="demo-controls">
        <span style="align-self:center; font-size:12px; font-weight:bold;">SIMULATEUR IA :</span>
        <button class="btn" style="background:var(--danger); min-width:120px;" onclick="simulateOrder('Livraison')">+ APPEL IA</button>
    </div>

    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <script>
        // Connexion Socket compatible HTTPS Render
        const socket = io({ transports: ['websocket'], upgrade: false });
        let stats = { livraison: 0, emporte: 0, sur_place: 0 };

        socket.on('connect', () => {
            document.getElementById('status').innerText = "Serveur Cloud Connecté ✅";
            document.getElementById('status').style.color = "#22c55e";
        });

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        const salesChart = new Chart(document.getElementById('salesChart'), {
            type: 'doughnut',
            data: { 
                labels: ['Livraison', 'Emporté', 'Sur Place'], 
                datasets: [{ data: [0, 0, 0], backgroundColor: ['#ef4444', '#22c55e', '#3b82f6'] }] 
            },
            options: { plugins: { legend: { labels: { color: 'white' } } } }
        });

        // Fonction pour ajouter un client physique (Comptoir)
        function addManualOrder() {
            const pizza = document.getElementById('manual-pizza').value;
            const size = document.getElementById('manual-size').value;
            if(!pizza) return alert("Nom de pizza oublié !");

            displayOrder({
                "call_sid": "MANUAL_" + Date.now(),
                "phone": "CLIENT SUR PLACE",
                "total": 15.00,
                "order": {
                    "pizzas": [{"nom": pizza, "quantité": 1, "taille": size}],
                    "order_type": "Sur Place"
                }
            });
            document.getElementById('manual-pizza').value = "";
        }

        function displayOrder(data) {
            let container = document.getElementById('orders-container');
            let card = document.createElement('div');
            card.id = data.call_sid;
            // On ne fait clignoter que les appels IA (pas le manuel)
            card.className = data.phone.startsWith("06") ? 'card blink' : 'card';
            
            const pizzasHtml = data.order.pizzas.map(p => `
                <div class="p-item"><b>${p.quantité}x ${p.nom} (${p.taille})</b></div>
            `).join('');

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-weight:bold; color:var(--accent);">
                    <span>${data.phone.startsWith("06") ? '📞 ' + data.phone : '👤 ' + data.phone}</span>
                </div>
                <div style="margin:10px 0;">${pizzasHtml}</div>
                <div class="total-price">${data.total.toFixed(2)} €</div>
                <div class="btn-group">
                    <button class="btn" style="background:var(--warning); color:black;" onclick="this.closest('.card').classList.remove('blink')">CUISINE</button>
                    <button class="btn" style="background:var(--danger)" onclick="archiveOrder('${data.call_sid}', '${data.order.order_type}', ${data.total})">🗑️ FINIR</button>
                </div>
            `;
            container.prepend(card);
            if(data.phone.startsWith("06")) document.getElementById('bell').play();
        }

        function archiveOrder(sid, type, total) {
            const card = document.getElementById(sid);
            const pizzaElements = card.querySelectorAll('.p-item');
            let detailsArray = [];
            pizzaElements.forEach(el => { detailsArray.push(el.innerText.trim()); });
            const detailsString = detailsArray.join(', ');

            // Envoi au serveur pour Excel
            socket.emit('delete_order', { total: total, type: type, details: detailsString });

            // Mise à jour des stats
            if(type === 'Livraison') stats.livraison++; 
            else if(type === 'Sur Place') stats.sur_place++;
            else stats.emporte++;

            salesChart.data.datasets[0].data = [stats.livraison, stats.emporte, stats.sur_place];
            salesChart.update();

            const hist = document.getElementById('history-list');
            hist.innerHTML = `<div style="padding:8px; border-bottom:1px solid #334155; font-size:12px;"><b>${type}</b> - ${total.toFixed(2)}€</div>` + hist.innerHTML;
            card.remove();
        }

        function simulateOrder(type) {
            displayOrder({
                "call_sid": "DEMO_" + Date.now(),
                "phone": "06 " + Math.floor(10000000 + Math.random() * 89999999),
                "total": 25.50,
                "order": {
                    "pizzas": [{"nom": "Orientale", "quantité": 1, "taille": "Mega"}],
                    "order_type": type
                }
            });
        }

        // Écoute les vrais appels IA
        socket.on('new_order', (data) => displayOrder(data));
    </script>
</body>
</html>
