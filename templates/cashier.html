<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍕 CAISSE PRO V3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; padding: 10px; }
        .header { background: #ef4444; padding: 10px; border-radius: 12px; text-align: center; margin-bottom: 10px; }
        .section-title { font-size: 11px; font-weight: bold; color: #94a3b8; text-transform: uppercase; margin: 15px 0 5px 5px; }
        
        /* Grilles Boutons */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-item { background: #1e293b; border: 2px solid #334155; color: white; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-item.active { border-color: #ef4444; background: #ef4444; }
        .btn-item.selected { border-color: #22c55e; background: #064e3b; }

        /* Tailles Junior/Senior/Mega */
        .size-box { display: flex; gap: 5px; margin-bottom: 10px; }
        .size-btn { flex: 1; padding: 10px; background: #1e293b; border: 2px solid #334155; color: white; border-radius: 8px; font-weight: bold; }
        .size-btn.active { background: #3b82f6; border-color: #3b82f6; }

        .order-zone { background: #1e293b; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn-send { background: #22c55e; color: white; width: 100%; border: none; padding: 18px; border-radius: 10px; font-weight: bold; font-size: 18px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h3>🍕 ALLO PIZZA CAISSE</h3></div>

    <div class="section-title">1. Taille</div>
    <div class="size-box">
        <button id="s-Junior" class="size-btn" onclick="setSize('Junior', 0)">JUNIOR</button>
        <button id="s-Senior" class="size-btn active" onclick="setSize('Senior', 3)">SENIOR</button>
        <button id="s-Mega" class="size-btn" onclick="setSize('Mega', 7)">MEGA</button>
    </div>

    <div class="section-title">2. Pizzas</div>
    <div class="grid">
        <button class="btn-item pz" id="p-Marguerita" onclick="selectPiz('Marguerita', 8)">Marguerita</button>
        <button class="btn-item pz" id="p-Reine" onclick="selectPiz('Reine', 10)">Reine</button>
        <button class="btn-item pz" id="p-4Fromages" onclick="selectPiz('4Fromages', 12)">4 Fromages</button>
        <button class="btn-item pz" id="p-Calzone" onclick="selectPiz('Calzone', 11)">Calzone</button>
    </div>

    <div class="section-title">3. Boissons & Desserts</div>
    <div class="grid">
        <button class="btn-item" onclick="addExtra('Coca', 2.5)">🥤 Coca (2.5€)</button>
        <button class="btn-item" onclick="addExtra('Eau', 1.5)">💧 Eau (1.5€)</button>
        <button class="btn-item" onclick="addExtra('Tiramisu', 4)">🍰 Dessert (4€)</button>
        <button class="btn-item" style="color:#ef4444" onclick="resetExtras()">❌ Effacer Supps</button>
    </div>

    <div class="order-zone">
        <input type="text" id="nom" placeholder="Nom Client">
        <input type="tel" id="tel" placeholder="Téléphone">
        <input type="text" id="adresse" placeholder="Adresse (si livraison)">
        <div id="summary" style="font-size:13px; color:#fbbf24; margin:10px 0; font-weight:bold; text-align:center;">Choisissez une pizza...</div>
        <button class="btn-send" onclick="envoyer()">ENVOYER COMMANDE 🚀</button>
    </div>

<script>
    const socket = io();
    let sz = 'Senior', addP = 3, piz = '', baseP = 0, extras = [], extraP = 0;

    function setSize(s, p) { 
        sz = s; addP = p; 
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('s-'+s).classList.add('active');
        update();
    }
    function selectPiz(n, p) { 
        piz = n; baseP = p; 
        document.querySelectorAll('.pz').forEach(b => b.classList.remove('selected'));
        document.getElementById('p-'+n).classList.add('selected');
        update();
    }
    function addExtra(n, p) { extras.push(n); extraP += p; update(); }
    function resetExtras() { extras = []; extraP = 0; update(); }

    function update() {
        let total = baseP + addP + extraP;
        let txt = piz ? `${piz} (${sz})` : '---';
        if(extras.length > 0) txt += " + " + extras.join(', ');
        document.getElementById('summary').innerHTML = txt + " <br> TOTAL : " + total.toFixed(2) + "€";
    }

    function envoyer() {
        if(!piz) return alert("Pizza ?");
        let data = {
            id: Date.now(), nom: document.getElementById('nom').value || "Client",
            tel: document.getElementById('tel').value || "N/A",
            type: document.getElementById('adresse').value ? "LIVRAISON" : "SUR PLACE",
            pizza: piz + " (" + sz + ") " + (extras.length > 0 ? "+ " + extras.join(', ') : ""),
            total: (baseP + addP + extraP).toFixed(2),
            adresse: document.getElementById('adresse').value || "N/A"
        };
        socket.emit('new_order', data);
        location.reload(); // Reset complet après envoi
    }
</script>
</body>
</html>
