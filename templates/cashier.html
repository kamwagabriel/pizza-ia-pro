<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍕 CAISSE PRO - TAILLES</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111827; color: white; margin: 0; padding: 10px; text-align: center; }
        .header { background: #d32f2f; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        
        /* SELECTEUR DE TAILLE */
        .size-selector { display: flex; gap: 5px; margin-bottom: 15px; }
        .size-btn { flex: 1; padding: 12px; border: 2px solid #374151; background: #1f2937; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .size-btn.active { border-color: #ef4444; background: #d32f2f; transform: scale(1.05); }

        /* GRILLE PIZZAS */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .pizza-btn { background: #1f2937; border: 2px solid #374151; color: white; padding: 15px; border-radius: 12px; cursor: pointer; }
        .pizza-btn:active { transform: scale(0.95); }
        .pizza-price { color: #22c55e; font-weight: bold; display: block; margin-top: 5px; }

        .order-zone { background: #1f2937; padding: 15px; border-radius: 15px; border: 2px solid #d32f2f; }
        .type-selector { display: flex; gap: 5px; margin-bottom: 10px; }
        .type-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; color: white; font-weight: bold; opacity: 0.3; }
        .type-btn.active { opacity: 1; transform: scale(1.05); }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #374151; background: #111827; color: white; box-sizing: border-box; font-size: 16px; }
        .btn-send { background: #d32f2f; color: white; width: 100%; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 18px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <p style="text-align:left; margin-bottom:5px; font-weight:bold; color:#94a3b8;">1. CHOISIR LA TAILLE :</p>
    <div class="size-selector">
        <button id="size-Junior" class="size-btn" onclick="setSize('Junior', 0)">JUNIOR</button>
        <button id="size-Senior" class="size-btn active" onclick="setSize('Senior', 3)">SENIOR</button>
        <button id="size-Mega" class="size-btn" onclick="setSize('Mega', 7)">MEGA</button>
    </div>

    <p style="text-align:left; margin-bottom:5px; font-weight:bold; color:#94a3b8;">2. CHOISIR LA PIZZA :</p>
    <div class="menu-grid">
        <div class="pizza-btn" onclick="selectPizza('Marguerita', 8)">
            <b>Marguerita</b><span class="pizza-price">Dès 8€</span>
        </div>
        <div class="pizza-btn" onclick="selectPizza('Reine', 10)">

        <div class="pizza-btn" onclick="selectPizza('4 Fromages', 12)">

        </div>
        <div class="pizza-btn" onclick="selectPizza('Calzone', 11)">
            <b>Calzone</b><span class="pizza-price">Dès 11€</span>
        </div>
    </div>

    <div class="order-zone">
        <div class="type-selector">
            <button id="btn-place" class="type-btn active" style="background:#f39c12" onclick="setType('place')">SUR PLACE</button>
            <button id="btn-emporte" class="type-btn" style="background:#22c55e" onclick="setType('emporte')">EMPORTÉ</button>
            <button id="btn-livraison" class="type-btn" style="background:#3b82f6" onclick="setType('livraison')">LIVRER</button>
        </div>
        
        <input type="text" id="nom" placeholder="Nom Client / N° Table">
        <input type="text" id="p_display" placeholder="Pizza, Taille et Prix..." readonly style="color:#fbbf24; font-weight:bold;">
        <input type="text" id="adresse" placeholder="Adresse de livraison..." style="display:none;">
        
        <input type="hidden" id="p_val">
        <input type="hidden" id="t_val">
        
        <button class="btn-send" onclick="envoyer()">ENVOYER EN CUISINE 🚀</button>
    </div>
