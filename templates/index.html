<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🍕 CONSOLE PIZZA PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 12px; border: 2px solid #3b82f6; text-align: left; position: relative; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }
        .btn { background: #ef4444; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .type { font-size: 12px; font-weight: bold; color: #fbbf24; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>🍕 CONSOLE DE CONTRÔLE</h1>
    <div id="orders" class="grid"></div>

    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <script>
        const socket = io();
        socket.on('new_order', (data) => {
            const container = document.getElementById('orders');
            const card = document.createElement('div');
            card.className = 'card';
            card.id = data.id;
            card.innerHTML = `
                <div class="type">${data.type}</div>
                <h3 style="margin:5px 0;">👤 ${data.nom}</h3>
                <p>🍕 ${data.pizza}</p>
                <p>🥤 ${data.extra || 'Rien'}</p>
                ${data.adresse && data.adresse !== 'N/A' ? `<p style="color:#3b82f6">📍 ${data.adresse}</p>` : ''}
                <button class="btn" onclick="this.parentElement.remove()">TERMINER ✅</button>
            `;
            container.prepend(card);
            document.getElementById('bell').play();
        });
    </script>
</body>
</html>
