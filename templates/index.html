<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>👨‍🍳 KDS PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --bg: #0a0a0c; --card: #1a1a1d; --blue: #00a8ff; --orange: #f39c12; --red: #e84118; --green: #4cd137; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .header { display: flex; justify-content: space-between; background: #2f3640; padding: 10px 20px; border-bottom: 4px solid var(--blue); margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .ticket { background: var(--card); border: 2px solid #353b48; display: flex; flex-direction: column; transition: 0.3s; }
        .ticket-h { padding: 8px; background: #353b48; display: flex; justify-content: space-between; font-weight: bold; font-size: 20px; }
        .ticket-b { padding: 15px; flex-grow: 1; }
        .items { font-size: 22px; font-weight: bold; color: #dcdde1; margin: 10px 0; }
        .urgent { border-color: var(--red) !important; animation: pulse-red 1.5s infinite; }
        .pret-anim { border-color: var(--green) !important; animation: pulse-green 1s infinite; }
        @keyframes pulse-red { 0%, 100% { box-shadow:0 0 5px var(--red); } 50% { box-shadow:0 0 20px var(--red); } }
        @keyframes pulse-green { 0%, 100% { box-shadow:0 0 5px var(--green); } 50% { box-shadow:0 0 20px var(--green); } }
        .btn-step { border: none; padding: 15px; font-weight: bold; cursor: pointer; font-size: 18px; width: 100%; text-transform: uppercase; }
        .map-btn { display: inline-block; background: #4285F4; color: white; text-decoration: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <div>👨‍🍳 KDS PIZZA IA</div>
        <div id="clock">00:00:00</div>
        <div>TOTAL: <span id="rev" style="color:var(--green)">0.00€</span> | <a href="/download_excel" style="color:white; font-size:12px;">📊 BILAN</a></div>
    </div>
    <div id="kds-grid" class="grid"></div>
    <audio id="notif" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    const socket = io(); let ca = 0;
    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString(); 
        updTimers(); 
    }, 1000);

    socket.on('new_order', (data) => {
        const ticket = document.createElement('div');
        ticket.className = 'ticket'; ticket.id = `t-${data.id}`; ticket.dataset.start = Date.now();
        ticket.dataset.info = JSON.stringify(data);
        ticket.innerHTML = `
            <div class="ticket-h"><span style="color:var(--blue)">#${data.order_num}</span><span class="tm">0:00</span></div>
            <div class="ticket-b">
                <div style="color:var(--orange); font-weight:bold;">[${data.type}] ${data.nom}</div>
                <div class="items">${data.pizza}</div>
                ${data.adresse!=='N/A'?`<div style="font-size:12px;">📍 ${data.adresse} <br><a href="https://www.google.com/maps/search/${encodeURIComponent(data.adresse)}" target="_blank" class="map-btn">GPS</a></div>`:''}
            </div>
            <div id="actions-${data.id}"><button class="btn-step" style="background:var(--blue); color:white;" onclick="statusCuire('${data.id}')">CUIRE 🍕</button></div>
        `;
        document.getElementById('kds-grid').prepend(ticket);
        document.getElementById('notif').play();
    });

    function updTimers() {
        document.querySelectorAll('.ticket').forEach(t => {
            if(t.classList.contains('is-finished')) return;
            let diff = Math.floor((Date.now() - parseInt(t.dataset.start))/1000);
            let m = Math.floor(diff/60), s = diff%60;
            t.querySelector('.tm').innerText = `${m}:${s<10?'0':''}${s}`;
            if(m >= 2 && !t.classList.contains('in-progress')) t.classList.add('urgent');
        });
    }

    function statusCuire(id) {
        const t = document.getElementById(`t-${id}`);
        t.classList.remove('urgent'); t.classList.add('in-progress'); t.style.borderColor = "var(--blue)";
        document.getElementById(`actions-${id}`).innerHTML = `<button class="btn-step" style="background:var(--orange); color:black;" onclick="statusPret('${id}')">PRÊT ✅</button>`;
    }

    function statusPret(id) {
        const t = document.getElementById(`t-${id}`);
        t.classList.add('pret-anim'); t.classList.add('is-finished');
        document.getElementById(`actions-${id}`).innerHTML = `<button class="btn-step" style="background:var(--green); color:black;" onclick="servir('${id}')">SERVIR ➔</button>`;
    }

    function servir(id) {
        const t = document.getElementById(`t-${id}`);
        const data = JSON.parse(t.dataset.info);
        socket.emit('finish_order_excel', data);
        ca += parseFloat(data.total); document.getElementById('rev').innerText = ca.toFixed(2)+"€";
        t.remove();
    }
</script>
</body>
</html>
