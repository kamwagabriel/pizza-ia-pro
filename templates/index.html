<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍🍳 KDS - PIZZA IA</title>
    <style>
        :root { 
            --bg: #1e293b; 
            --card: #ffffff; 
            --orange: #f39c12; 
            --blue: #3498db;
            --green: #2ecc71;
            --red: #e74c3c;
        }
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: var(--bg); 
            color: white; 
            margin: 0; 
            padding: 10px; 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: #0f172a; 
            padding: 15px; 
            border-bottom: 3px solid var(--orange); 
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px; 
        }
        .ticket { 
            background: var(--card); 
            color: #1e293b; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ticket-h { padding: 10px; background: #f1f5f9; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }
        .ticket-b { padding: 15px; }
        .items { font-size: 22px; font-weight: 900; color: #000; border-left: 5px solid var(--orange); padding-left: 10px; margin: 10px 0; }
        .footer { display: grid; grid-template-columns: 1fr 2fr; gap: 2px; background: #ddd; }
        .btn { border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-cancel { background: #fee2e2; color: var(--red); }
        .btn-next { background: var(--blue); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 18px; font-weight: bold;">🍕 PIZZA IA - CUISINE</div>
        <div style="font-weight: bold;">STATUT: <span style="color:var(--green)">EN LIGNE</span></div>
    </div>

    <div id="kds-grid" class="grid">
        {% for order in orders %}
        <div id="t-{{ order.id }}" class="ticket">
            <div class="ticket-h">
                <span>#{{ order.id }}</span>
                <span>{{ order.heure }}</span>
            </div>
            <div class="ticket-b">
                <div style="font-size:12px; color:var(--blue); font-weight:bold;">COMMANDE IA</div>
                <div class="items">{{ order.commande }}</div>
                <div style="font-size:13px; color:#64748b;">👤 {{ order.client }}</div>
                <div style="font-size:13px; color:#64748b;">📍 {{ order.adresse }}</div>
            </div>
            <div class="footer" id="f-{{ order.id }}">
                <button class="btn btn-cancel" onclick="annuler('{{ order.id }}')">ANNULER</button>
                <button class="btn btn-next" onclick="etape2('{{ order.id }}')">CUIRE 🍕</button>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        function etape2(id) {
            document.getElementById(`f-${id}`).innerHTML = `
                <button class="btn btn-cancel" onclick="annuler('${id}')">ANNULER</button>
                <button class="btn btn-next" style="background:var(--orange)" onclick="etape3('${id}')">PRÊT ✅</button>`;
        }
        function etape3(id) {
            document.getElementById(`f-${id}`).innerHTML = `
                <button class="btn btn-cancel" onclick="annuler('${id}')">ANNULER</button>
                <button class="btn btn-next" style="background:var(--green)" onclick="finir('${id}')">SERVIR ➔</button>`;
        }
        function finir(id) {
            document.getElementById(`t-${id}`).remove();
        }
        function annuler(id) {
            if(confirm("Supprimer cette commande ?")) document.getElementById(`t-${id}`).remove();
        }
    </script>
</body>
</html>
