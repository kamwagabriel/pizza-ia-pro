<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>👨‍🍳 KDS - SYSTÈME CUISINE PIZZA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --card-bg: #1a1a1d;
            --text-main: #ffffff;
            --accent-blue: #00a8ff;
            --urgent-orange: #f39c12;
            --danger-red: #e84118;
            --success-green: #4cd137;
        }

        body {
            font-family: 'Courier New', Courier, monospace; /* Style ticket de caisse */
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        /* En-tête de la cuisine */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2f3640;
            padding: 10px 20px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-bottom: 4px solid var(--accent-blue);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        /* Carte de Commande Style Resto */
        .ticket {
            background: var(--card-bg);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            border: 2px solid #353b48;
            position: relative;
            transition: 0.3s;
        }

        .ticket-header {
            padding: 8px;
            background: #353b48;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .ticket-body {
            padding: 15px;
            flex-grow: 1;
        }

        .order-num { font-size: 24px; color: var(--accent-blue); }
        .timer { font-size: 18px; color: #95afc0; }

        .client-info {
            font-size: 14px;
            border-bottom: 1px dashed #444;
            padding-bottom: 8px;
            margin-bottom: 10px;
            color: var(--urgent-orange);
        }

        .items-list {
            font-size: 20px;
            font-weight: bold;
            line-height: 1.4;
            color: #dcdde1;
        }

        .address-box {
            background: #273142;
            padding: 5px;
            margin-top: 10px;
            font-size: 12px;
            border-radius: 3px;
        }

        /* Animation d'Urgence */
        .urgent { border-color: var(--danger-red) !important; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(232, 65, 24, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(232, 65, 24, 0); }
            100% { box-shadow: 0 0 0 0 rgba(232, 65, 24, 0); }
        }

        .btn-complete {
            background: var(--success-green);
            color: black;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
        }

        .btn-complete:active { background: #44bd32; }

        .type-badge {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <div><span style="color:var(--success-green)">●</span> CUISINE ACTIVE</div>
        <div id="clock">00:00:00</div>
        <div>RECETTE: <span id="revenue" style="color:var(--success-green)">0.00€</span></div>
    </div>

    <div id="kds-grid" class="grid">
        </div>

    <audio id="notif" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    const socket = io();
    let totalCA = 0;

    // Horloge
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        updateTimers();
    }, 1000);

    socket.on('new_order', (data) => {
        const grid = document.getElementById('kds-grid');
        const startTime = Date.now();
        
        const ticket = document.createElement('div');
        ticket.className = 'ticket';
        ticket.id = `ticket-${data.id}`;
        ticket.dataset.start = startTime;

        ticket.innerHTML = `
            <div class="ticket-header">
                <span class="order-num">#${data.order_num}</span>
                <span class="timer" id="timer-${data.id}">0:00</span>
            </div>
            <div class="ticket-body">
                <div class="client-info">
                    <span class="type-badge">${data.type}</span> ${data.nom}
                </div>
                <div class="items-list">
                    ${data.pizza}
                </div>
                ${data.adresse !== 'N/A' ? `<div class="address-box">📍 ${data.adresse}</div>` : ''}
                <div style="margin-top:10px; font-size:12px; color:var(--accent-blue)">📞 ${data.tel}</div>
            </div>
            <button class="btn-complete" onclick="finish('${data.id}', '${data.total}', '${data.nom}', '${data.pizza}', '${data.order_num}', '${data.type}', '${data.tel}')">
                SERVIR ➔
            </button>
        `;
        
        grid.prepend(ticket);
        document.getElementById('notif').play();
    });

    function updateTimers() {
        document.querySelectorAll('.ticket').forEach(ticket => {
            const start = parseInt(ticket.dataset.start);
            const diff = Math.floor((Date.now() - start) / 1000);
            const minutes = Math.floor(diff / 60);
            const seconds = diff % 60;
            const timerDisplay = ticket.querySelector('.timer');
            timerDisplay.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

            // Changement de couleur selon le délai (KDS Style)
            if (minutes >= 1) ticket.style.borderColor = "var(--urgent-orange)";
            if (minutes >= 2) ticket.classList.add('urgent');
        });
    }

    function finish(id, price, nom, pizza, num, type, tel) {
        socket.emit('finish_order_excel', {order_num:num, nom:nom, total:price, pizza:pizza, type:type, tel:tel});
        totalCA += parseFloat(price);
        document.getElementById('revenue').innerText = totalCA.toFixed(2) + "€";
        document.getElementById(`ticket-${id}`).remove();
    }
</script>
</body>
</html>
