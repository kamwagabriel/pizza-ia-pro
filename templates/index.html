<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🍕 CONSOLE CUISINE - PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --success: #22c55e; --warning: #fbbf24; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 25px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #334155; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        
        /* CARTE CLIGNOTANTE */
        .card { 
            background: var(--card); border-radius: 20px; padding: 20px; border: 4px solid var(--danger); 
            position: relative; animation: flash 1.5s infinite; transition: 0.3s;
        }
        @keyframes flash { 
            0% { border-color: var(--danger); box-shadow: 0 0 10px var(--danger); }
            50% { border-color: var(--accent); box-shadow: 0 0 20px var(--accent); }
            100% { border-color: var(--danger); box-shadow: 0 0 10px var(--danger); }
        }

        .order-id { background: white; color: black; padding: 4px 12px; border-radius: 8px; font-weight: 900; font-size: 22px; margin-bottom: 10px; display: inline-block; }
        .price-badge { position: absolute; top: 20px; right: 20px; background: var(--success); color: white; padding: 8px 15px; border-radius: 10px; font-size: 20px; font-weight: bold; }
        
        .client-name { font-size: 24px; margin: 10px 0; color: #f8fafc; }
        .client-tel { color: var(--warning); font-size: 19px; font-weight: bold; display: block; margin-bottom: 15px; }
        
        .pizza-detail { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border-left: 6px solid var(--warning); font-size: 22px; font-weight: bold; }
        
        .address { margin-top: 15px; color: #94a3b8; font-style: italic; display: flex; align-items: center; gap: 5px; }
        
        .btn-ready { background: var(--success); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 20px; transition: 0.2s; }
        .btn-ready:hover { transform: scale(1.02); filter: brightness(1.1); }

        .stats-box { margin-top: 40px; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1 style="margin:0;">👨‍🍳 CUISINE • <span id="time-now" style="color:var(--accent)">00:00</span></h1>
        <div style="display:flex; gap:15px;">
            <div style="text-align:right;">
                <div style="font-size:12px; opacity:0.6;">RECETTE DU JOUR</div>
                <div id="total-ca" style="font-size:24px; font-weight:bold; color:var(--success);">0.00€</div>
            </div>
            <a href="/download_excel" style="background:var(--success); color:white; padding:10px 15px; border-radius:10px; text-decoration:none; font-weight:bold; align-self:center;">📥 EXCEL</a>
        </div>
    </div>

    <div id="orders-container" class="grid"></div>

    <div class="stats-box">
        <h3 style="margin-top:0;">📊 Historique Session</h3>
        <div id="history-log" style="font-family:monospace; font-size:13px; opacity:0.7;"></div>
    </div>

    <audio id="sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    const socket = io();
    let revenue = 0;

    // Horloge temps réel
    setInterval(() => {
        document.getElementById('time-now').innerText = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    }, 1000);

    socket.on('new_order', (data) => {
        const container = document.getElementById('orders-container');
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${data.id}`;
        
        card.innerHTML = `
            <div class="price-badge">${data.total}€</div>
            <div class="order-id">#${data.order_num}</div>
            <div style="font-size:12px; color:var(--accent); font-weight:bold;">🕒 REÇUE À ${data.time} • ${data.type.toUpperCase()}</div>
            <h2 class="client-name">👤 ${data.nom}</h2>
            <span class="client-tel">📞 ${data.tel}</span>
            <div class="pizza-detail">🍕 ${data.pizza}</div>
            ${data.adresse !== 'N/A' ? `<div class="address">📍 ${data.adresse}</div>` : ''}
            <button class="btn-ready" onclick="complete('${data.id}', ${data.total}, '${data.nom}', '${data.pizza}', '${data.order_num}', '${data.type}', '${data.tel}')">MARQUER COMME PRÊT ✅</button>
        `;
        
        container.prepend(card);
        document.getElementById('sound').play();
    });

    function complete(id, price, nom, pizza, num, type, tel) {
        // Envoi au serveur pour Excel
        socket.emit('finish_order_excel', {order_num: num, nom: nom, total: price, pizza: pizza, type: type, tel: tel});
        
        // Update Revenue
        revenue += parseFloat(price);
        document.getElementById('total-ca').innerText = revenue.toFixed(2) + "€";
        
        // Log historique
        const log = document.getElementById('history-log');
        log.innerHTML = `[${new Date().toLocaleTimeString()}] Commande #${num} (${nom}) terminée. <br>` + log.innerHTML;
        
        // Remove Card
        document.getElementById(`card-${id}`).style.transform = "scale(0)";
        setTimeout(() => document.getElementById(`card-${id}`).remove(), 300);
    }
</script>
</body>
</html>
