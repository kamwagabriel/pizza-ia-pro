<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🍕 CONSOLE PIZZA PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 2px solid #3b82f6; text-align: left; position: relative; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); animation: blink 1.5s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }
        .btn { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; font-size: 16px; }
        .type { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background: #fbbf24; color: #000; margin-bottom: 10px; }
        .pizza-list { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border-left: 4px solid #3b82f6; margin: 10px 0; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🍕 TABLEAU DE BORD CUISINE</h1>
    <div id="orders" class="grid"></div>

    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <script>
        const socket = io();
        socket.on('new_order', (data) => {
            const container = document.getElementById('orders');
            const card = document.createElement('div');
            card.className = 'card';
            card.id = data.id;
            
            card.innerHTML = `
                <div class="type">${data.type.toUpperCase()}</div>
                <h2 style="margin:0;">👤 ${data.nom}</h2>
                <div class="pizza-list">🍕 ${data.pizza}</div>
                <div style="color:#94a3b8;">🥤 Extras : ${data.extra}</div>
                ${data.adresse && data.adresse !== 'N/A' ? `<div style="margin-top:10px; color:#3b82f6; font-weight:bold;">📍 ${data.adresse}</div>` : ''}
                <button class="btn" onclick="this.parentElement.remove()">TERMINER ✅</button>
            `;
            container.prepend(card);
            document.getElementById('bell').play();
        });
    </script>
</body>
</html>
