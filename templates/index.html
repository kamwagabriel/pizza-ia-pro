<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍕 CONSOLE CUISINE PRO - ALLO PIZZA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --accent: #3b82f6; 
            --success: #22c55e; 
            --warning: #fbbf24; 
            --danger: #ef4444; 
            --text: #f8fafc;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
        }

        /* Barre de navigation haute */
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--card); 
            padding: 15px 30px; 
            border-radius: 15px; 
            margin-bottom: 25px; 
            border: 1px solid #334155;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .stats-group { text-align: right; }
        .revenue-val { font-size: 28px; font-weight: 900; color: var(--success); }

        /* Grille des commandes */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); 
            gap: 20px; 
        }

        /* CARTE COMMANDE - EFFET CLIGNOTANT */
        .card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 20px; 
            border: 4px solid var(--danger); 
            position: relative; 
            animation: ultra-blink 1.5s infinite; 
            transition: transform 0.3s ease;
        }

        @keyframes ultra-blink { 
            0% { border-color: var(--danger); box-shadow: 0 0 10px var(--danger); }
            50% { border-color: var(--accent); box-shadow: 0 0 25px var(--accent); }
            100% { border-color: var(--danger); box-shadow: 0 0 10px var(--danger); }
        }

        /* Détails de la carte */
        .order-id { background: white; color: black; padding: 4px 12px; border-radius: 8px; font-weight: 900; font-size: 22px; margin-bottom: 10px; display: inline-block; }
