<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👨‍🍳 KDS - CUISINE PIZZA IA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --bg: #0a0a0c; --card: #1a1a1d; --blue: #00a8ff; --orange: #f39c12; --red: #e84118; --green: #4cd137; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: white; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Header avec CA */
        .header { display: flex; justify-content: space-between; background: #2f3640; padding: 15px; border-bottom: 4px solid var(--orange); margin-bottom: 15px; align-items: center; border-radius: 8px; }
        #rev { color: var(--green); font-weight: 900; font-size: 1.4em; }

        /* Grille des Tickets */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        
        /* Style du Ticket Pizza */
        .ticket { background: var(--card); border: 2px solid #353b48; border-radius: 8px; overflow: hidden; transition: 0.3s; position: relative; animation: popIn 0.3s ease-out; }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .ticket-h { padding: 10px; background: #353b48; display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #444; }
        .ticket-b { padding: 20px; }
        
        .items { font-size: 26px; font-weight: bold; color: #fff; margin: 10px 0; border-left: 6px solid var(--orange); padding-left: 12px; line-height: 1.2; }
        .client-info { color: #94a3b8; font-size: 13px; margin-top: 10px; }

        /* Animation Urgence */
        .urgent { border-color: var(--red) !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 5px var(--red); } 50% { box-shadow: 0 0 25px var(--red); } }

        /* Boutons d'action en bas du ticket */
        .action-footer { display: grid; grid-template-columns: 1fr 2.5fr; gap: 5px; background: #222; border-top: 1px solid #444; }
        .btn-step { border: none; padding: 22px; font-weight: bold; cursor: pointer; font-size: 16px; text-transform: uppercase; transition: 0.2s; }
